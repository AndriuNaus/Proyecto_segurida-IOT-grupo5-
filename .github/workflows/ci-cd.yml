name: Pipeline de Integración y Despliegue Continuo (CI/CD)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/andriunaus/proyecto_segurida-iot-grupo5

jobs:
  # ----------------------------------------------------
  # ETAPA 1: Integración Continua (Validación y Calidad)
  # ----------------------------------------------------
  ci-validation:
    name: Validación e Integración (Backend & Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno de Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar Dependencias del Servidor (Backend)
        run: npm ci

      - name: Instalar Dependencias de la Interfaz (Frontend)
        run: npm ci --prefix frontend

      - name: Validar Tipados de TypeScript (Backend)
        run: npx tsc --noEmit

      - name: Ejecutar Análisis de Calidad Linter (Frontend)
        run: npm run lint --prefix frontend

      - name: Compilar Frontend (Construcción del Bundle)
        run: npm run build --prefix frontend

  # ----------------------------------------------------
  # ETAPA 2: Análisis de Seguridad
  # ----------------------------------------------------
  security-scan:
    name: Análisis de Vulnerabilidades (Seguridad)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Analizar Dependencias del Backend
        run: npm audit --audit-level=high || echo "Advertencia de vulnerabilidades en backend"

      - name: Analizar Dependencias del Frontend
        run: npm audit --prefix frontend --audit-level=high || echo "Advertencia de vulnerabilidades en frontend"

  # ----------------------------------------------------
  # ETAPA 3: Construcción y Empaquetado Docker (CD)
  # ----------------------------------------------------
  build-docker-image:
    name: Construcción de Imagen Docker
    runs-on: ubuntu-latest
    needs: [ci-validation, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar Sesión en GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Publicar Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ----------------------------------------------------
  # ETAPA 4: Despliegue Automático en Servidor AWS (CD)
  # ----------------------------------------------------
  deploy:
    name: Despliegue en Ambiente de Producción
    runs-on: ubuntu-latest
    needs: build-docker-image
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Conectar por SSH a AWS y Desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== CONECTADO A AWS EC2 ==="
            cd ~/proyecto || cd ~/Proyecto_segurida-IOT-grupo5- || exit 1
            
            echo "1. Obteniendo últimos cambios del repositorio..."
            git pull origin main
            
            echo "2. Reconstruyendo imagen Docker (backend-iot)..."
            sudo docker build -t backend-iot .
            
            echo "3. Deteniendo y reemplazando contenedor 'backend-iot'..."
            sudo docker stop backend-iot || true
            sudo docker rm backend-iot || true
            sudo docker run -d --name backend-iot -p 3000:3000 --restart always --env-file .env backend-iot
            
            echo "=== DESPLIEGUE AUTOMÁTICO COMPLETADO SATISFACTORIAMENTE ==="
